name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  LIBOQS_VERSION: 0.10.0

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install liboqs build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libssl-dev

      - name: Build and install liboqs to /usr/local
        run: |
          git clone --depth 1 --branch ${LIBOQS_VERSION} https://github.com/open-quantum-safe/liboqs.git
          cd liboqs && mkdir build && cd build
          cmake -GNinja -DCMAKE_INSTALL_PREFIX=/usr/local -DOQS_BUILD_ONLY_LIB=ON -DBUILD_SHARED_LIBS=ON ..
          sudo ninja install
          sudo ldconfig

      - run: pip install -e ".[dev]"
      - run: pytest -v
      - name: Run the demo
        run: python -m pqc_hybrid_handshake
